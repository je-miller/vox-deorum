<body>
	<div class="textures">
		<!-- Terrain -->
		<img id="GRASSLAND" src="./assets/tiles/GRASSLAND.png" crossOrigin="Anonymous">
		<img id="PLAINS" src="./assets/tiles/PLAINS.png" crossOrigin="Anonymous">
		<img id="DESERT" src="./assets/tiles/DESERT.png" crossOrigin="Anonymous">
		<img id="TUNDRA" src="./assets/tiles/TUNDRA.png" crossOrigin="Anonymous">
		<img id="SNOW" src="./assets/tiles/SNOW.png" crossOrigin="Anonymous">
		<img id="COAST" src="./assets/tiles/COAST.png" crossOrigin="Anonymous">
		<img id="OCEAN" src="./assets/tiles/OCEAN.png" crossOrigin="Anonymous">

		<!-- Elevation -->
		<img id="MOUNTAIN" src="./assets/tiles/MOUNTAIN.png" crossOrigin="Anonymous">
		<img id="HILLS" src="./assets/tiles/HILLS.png" crossOrigin="Anonymous">

		<!-- Features -->
		<img id="ICE" src="./assets/tiles/ICE.png" crossOrigin="Anonymous">
		<img id="JUNGLE" src="./assets/tiles/JUNGLE.png" crossOrigin="Anonymous">
		<!-- <img id="MARSH"        src="./assets/tiles/MARSH.png"        crossOrigin="Anonymous"> -->
		<!-- <img id="OASIS"        src="./assets/tiles/OASIS.png"        crossOrigin="Anonymous"> -->
		<!-- <img id="FLOOD_PLAINS" src="./assets/tiles/FLOOD_PLAINS.png" crossOrigin="Anonymous"> -->
		<img id="FOREST" src="./assets/tiles/FOREST.png" crossOrigin="Anonymous">
	</div>

	<h2 class="page-header-area">Civilization V (<a href="https://github.com/LoneGazebo/Community-Patch-DLL"
			target="_blank">Community Patch/Vox Populi</a>) Replay Viewer</h2>

	<div class="main-container">
		<div class="top-bar">
			<div class="top-left-corner"></div>

			<div class="top-left">
				<button id="playPause" class="btn btn-primary"><i class="fa fa-play"></i></button>
				<input id="speedSlider" type="text" />
			</div>

			<div class="top-left-split"></div>

			<div class="top-middle">
				<input id="turnSlider" type="text" />
			</div>

			<div class="top-right-split"></div>

			<div class="top-right">
				<select id="event-select" class="selectpicker" multiple data-selected-text-format="count">
					<option value="0">Messages </option>
					<option value="7">Strategies </option>
					<option value="1">New cities </option>
					<option value="3">City transfers</option>
					<option value="4">City razings </option>
					<option value="6">Pantheons </option>
					<option value="5">Religions </option>
					<option value="2">Tile claims </option>
				</select>
			</div>

			<div class="top-right-corner flipped"></div>
		</div>

		<div class="border left-border"></div>

		<div class="map-container">
			<div class="map"></div>
		</div>

		<div class="border split-border"></div>

		<div class="log-container">
			<ul class="log-messages"></ul>
		</div>

		<div class="border right-border flipped"></div>

		<div class="bottom-border">
			<div class="bottom-left-corner"></div>
			<div class="bottom-left"></div>
			<div class="bottom-middle"></div>
			<div class="bottom-right"></div>
			<div class="bottom-right-corner flipped"></div>
		</div>
	</div>

		which keeps Civ V alive to this date.
	</div>

	<script src="./vendor/lodash.js" type="text/javascript"></script>
